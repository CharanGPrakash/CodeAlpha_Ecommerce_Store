<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyBee - Checkout</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">Buy<span>Bee</span> 🐝</div>
    <nav class="categories-nav"></nav>
    <nav id="main-nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main>
    <h2>🧾 Checkout</h2>

    <div class="checkout-container">

      <!-- Left: Form -->
      <div class="checkout-form-section">
        <form id="checkout-form">

          <div class="form-section-title">📦 Delivery Details</div>

          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>

          <label>Delivery Address</label>
          <input type="text" id="address" placeholder="House no, Street, Area, City" required>

          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="10 digit mobile number" required>

          <div class="form-section-title" style="margin-top:25px;">💳 Payment Method</div>

          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="cod" checked>
              <span>💵 Cash on Delivery</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="upi">
              <span>📱 UPI Payment</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="card">
              <span>💳 Credit/Debit Card</span>
            </label>
          </div>

          <button type="submit">Place Order 🎉</button>

        </form>
      </div>

      <!-- Right: Order Summary -->
      <div class="checkout-summary">
        <h3>Order Summary</h3>
        <div id="order-summary"></div>
        <div class="summary-row total" style="margin-top:15px;">
          <span>Total Amount</span>
          <span>₹<span id="order-total">0</span></span>
        </div>
      </div>

    </div>

    <!-- Confirmation -->
    <div id="confirmation" style="display:none;">
      <div class="confirmation-box">
        <div style="font-size:70px;">🎉</div>
        <h2>Order Placed Successfully!</h2>
        <p>Thank you, <strong id="confirm-name"></strong>!</p>
        <p style="color:#888;margin-top:10px;">Your order will be delivered to<br><strong id="confirm-address"></strong></p>
        <a href="orders.html">
          <button style="margin-top:25px;padding:12px 30px;background:#f5c518;color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:15px;">
            View My Orders
          </button>
        </a>
        <a href="index.html">
          <button style="margin-top:10px;padding:12px 30px;background:transparent;color:#fff;border:1px solid #2a2a2a;border-radius:8px;font-weight:600;cursor:pointer;font-size:15px;">
            Continue Shopping
          </button>
        </a>
      </div>
    </div>

  </main>

  <script src="checkout.js"></script>
</body>
</html>
