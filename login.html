<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyBee - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">Buy<span>Bee</span> 🐝</div>
    <nav class="categories-nav"></nav>
    <nav id="main-nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main>
    <div id="auth-container">

      <!-- Login Form -->
      <div id="login-section">
        <div style="text-align:center;margin-bottom:25px;">
          <div style="font-size:40px;">🐝</div>
          <h2 style="font-size:24px;margin-top:10px;">Welcome Back!</h2>
          <p style="color:#888;font-size:13px;margin-top:5px;">Login to your BuyBee account</p>
        </div>
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="Enter your email">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password">
        <button onclick="login()">Login to BuyBee</button>
        <p>Don't have an account? <a href="#" onclick="toggleForm()">Register here</a></p>
      </div>

      <!-- Register Form -->
      <div id="register-section" style="display:none;">
        <div style="text-align:center;margin-bottom:25px;">
          <div style="font-size:40px;">🐝</div>
          <h2 style="font-size:24px;margin-top:10px;">Create Account</h2>
          <p style="color:#888;font-size:13px;margin-top:5px;">Join BuyBee today!</p>
        </div>
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Enter your full name">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="Enter your email">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Create a password">
        <button onclick="register()">Create Account</button>
        <p>Already have an account? <a href="#" onclick="toggleForm()">Login here</a></p>
      </div>

      <p id="auth-message" style="margin-top:15px;text-align:center;font-size:13px;"></p>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
