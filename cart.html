<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyBee - Cart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">Buy<span>Bee</span> 🐝</div>
    <nav class="categories-nav"></nav>
    <nav id="main-nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="orders.html"><i class="fa fa-box"></i> Orders</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main>
    <h2>🛒 Your Cart</h2>
    <div class="cart-container">
      <div id="cart-items"></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Items</span>
          <span id="cart-item-count">0</span>
        </div>
        <div class="summary-row">
          <span>Total Amount</span>
          <span>₹<span id="cart-total">0</span></span>
        </div>
        <div class="summary-row total">
          <span>To Pay</span>
          <span>₹<span id="cart-topay">0</span></span>
        </div>
        <a href="checkout.html">
          <button id="checkout-btn">Proceed to Checkout →</button>
        </a>
        <a href="index.html" style="display:block;text-align:center;margin-top:15px;color:#888;font-size:13px;">
          Continue Shopping
        </a>
      </div>
    </div>
  </main>

  <script src="cart.js"></script>
</body>
</html>
